services:
  app:
    build: .
    container_name: erp-k2-app
    restart: unless-stopped
    environment:
      # Keep DB outside container image
      DATABASE_PATH: /app/data/erp.db
      NODE_ENV: production
    volumes:
      - ./data:/app/data
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: erp-k2-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

