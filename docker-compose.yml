services:
  app:
    build: .
    container_name: erp-k2-app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      NODE_ENV: ${NODE_ENV:-production}
      FOCUS_NFE_ENV: ${FOCUS_NFE_ENV:-}
      FOCUS_NFE_TOKEN: ${FOCUS_NFE_TOKEN:-}
      FOCUS_NFE_PROD_UNLOCK: ${FOCUS_NFE_PROD_UNLOCK:-}
      FOCUS_HTTP_TIMEOUT_MS: ${FOCUS_HTTP_TIMEOUT_MS:-}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      FISCAL_ISSUER_CNPJ: ${FISCAL_ISSUER_CNPJ:-}
      FISCAL_ISSUER_IE: ${FISCAL_ISSUER_IE:-}
      FISCAL_ISSUER_RAZAO: ${FISCAL_ISSUER_RAZAO:-}
      FISCAL_ISSUER_FANTASIA: ${FISCAL_ISSUER_FANTASIA:-}
      FISCAL_ISSUER_LOGRADOURO: ${FISCAL_ISSUER_LOGRADOURO:-}
      FISCAL_ISSUER_NUMERO: ${FISCAL_ISSUER_NUMERO:-}
      FISCAL_ISSUER_BAIRRO: ${FISCAL_ISSUER_BAIRRO:-}
      FISCAL_ISSUER_MUNICIPIO: ${FISCAL_ISSUER_MUNICIPIO:-}
      FISCAL_ISSUER_UF: ${FISCAL_ISSUER_UF:-}
      FISCAL_ISSUER_CEP: ${FISCAL_ISSUER_CEP:-}
      FISCAL_ISSUER_COD_MUN: ${FISCAL_ISSUER_COD_MUN:-}
      FISCAL_NFE_SERIE_HOMOLOG: ${FISCAL_NFE_SERIE_HOMOLOG:-}
      FISCAL_NFE_START_NUMBER_HOMOLOG: ${FISCAL_NFE_START_NUMBER_HOMOLOG:-}
      FISCAL_DEFAULT_OPERATION_CODE: ${FISCAL_DEFAULT_OPERATION_CODE:-}
      FISCAL_DEFAULT_PROFILE_CODE: ${FISCAL_DEFAULT_PROFILE_CODE:-}
      FISCAL_INLINE_WORKER: ${FISCAL_INLINE_WORKER:-}
      FISCAL_PG_CLOSE_ON_IDLE: ${FISCAL_PG_CLOSE_ON_IDLE:-}
      SICREDI_ENV: ${SICREDI_ENV:-}
      SICREDI_API_KEY: ${SICREDI_API_KEY:-}
      SICREDI_USERNAME: ${SICREDI_USERNAME:-}
      SICREDI_PASSWORD: ${SICREDI_PASSWORD:-}
      SICREDI_COOPERATIVA: ${SICREDI_COOPERATIVA:-}
      SICREDI_POSTO: ${SICREDI_POSTO:-}
      SICREDI_CODIGO_BENEFICIARIO: ${SICREDI_CODIGO_BENEFICIARIO:-}
      SICREDI_CONTEXT: ${SICREDI_CONTEXT:-}
      SICREDI_TIPO_COBRANCA: ${SICREDI_TIPO_COBRANCA:-}
      SICREDI_ESPECIE_DOCUMENTO: ${SICREDI_ESPECIE_DOCUMENTO:-}
    volumes:
      - ./data:/app/data
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: erp-k2-nginx
    restart: unless-stopped
    depends_on:
      - app
    network_mode: host
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
